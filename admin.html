<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Super admin — Compatibility Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="theme-toggle.js"></script>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#100c1c">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CompatQuiz">
<style>
  .user-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px;}
  .user-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .user-name{font-weight:600;}
  .user-email{font-size:12px;color:var(--text-dim);font-family:'Space Mono',monospace;}
  .user-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .grant-row{display:flex;gap:8px;align-items:center;}
  .grant-row input{width:80px;margin:0;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="wrap wide" id="app">
  <div class="card">
    <div class="eyebrow">Zone privée</div>
    <h1 class="title" style="font-size:22px;">Super admin</h1>
    <input type="password" id="pwInput" placeholder="Clé d'accès admin" />
    <button class="btn" id="pwBtn">Entrer</button>
    <div class="error-msg" id="pwError"></div>
  </div>
</div>

<script>
let ADMIN_KEY = null;

document.getElementById('pwBtn').addEventListener('click', async ()=>{
  const key = document.getElementById('pwInput').value;
  if(!key){ return; }
  ADMIN_KEY = key;
  const result = await loadUsers();
  if(!result.ok){
    document.getElementById('pwError').textContent = result.message;
    ADMIN_KEY = null;
  }
});

async function callAdminApi(path, body){
  try{
    const res = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify(body || {})
    });
    const data = await res.json().catch(()=>null);
    return { ok: res.ok, status: res.status, data };
  } catch(networkErr){
    // Ça, c'est un vrai échec réseau (le domaine ne répond pas, la fonction
    // /api n'existe pas sur ce déploiement, etc.) — différent d'une mauvaise clé.
    console.error('Erreur réseau vers /api :', networkErr);
    return { ok:false, status:0, data:null, networkError:true };
  }
}

function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

async function loadUsers(){
  const res = await callAdminApi('/api/admin-list-users', {});
  if(res.networkError){
    return { ok:false, message:"Impossible de joindre /api (vérifie que le déploiement Vercel inclut bien le dossier /api)." };
  }
  if(res.status === 401){
    return { ok:false, message:"Clé incorrecte." };
  }
  if(!res.ok || !res.data){
    // On affiche l'erreur brute renvoyée par le serveur : c'est ce qui
    // permet de voir immédiatement si SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY
    // manquent ou sont mal renseignées sur Vercel, au lieu d'un message vague.
    const detail = (res.data && res.data.error) ? res.data.error : `Erreur serveur (code ${res.status}).`;
    return { ok:false, message:detail };
  }
  if(!res.data.users){
    return { ok:false, message:"Réponse inattendue du serveur." };
  }
  renderUsers(res.data.users);
  return { ok:true };
}

function renderUsers(users){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="top-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div>
        <div class="eyebrow">Super admin</div>
        <h1 class="title" style="font-size:24px;">Utilisateurs (${users.length})</h1>
      </div>
      <button class="btn ghost small" id="refreshBtn">Rafraîchir</button>
    </div>
    <div id="usersZone"></div>
  `;
  document.getElementById('refreshBtn').addEventListener('click', loadUsers);

  const zone = document.getElementById('usersZone');
  if(users.length === 0){
    zone.innerHTML = `<p class="empty-state">Aucun utilisateur pour l'instant.</p>`;
    return;
  }
  zone.innerHTML = users.map(u=>{
    const proActive = u.pro_until && new Date(u.pro_until) > new Date();
    const banned = u.is_banned;
    return `
      <div class="user-card">
        <div class="user-top">
          <div>
            <div class="user-name">${escapeHtml(u.username || '(sans nom)')} ${banned ? '<span class="pill banned">Banni</span>' : ''} ${proActive ? `<span class="pill pro">Pro jusqu'au ${new Date(u.pro_until).toLocaleDateString('fr-FR')}</span>` : ''}</div>
            <div class="user-email">${escapeHtml(u.email)}</div>
          </div>
        </div>
        <div class="user-actions">
          <div class="grant-row">
            <input type="number" min="1" placeholder="jours" id="days-${u.id}" />
            <button class="btn small secondary" data-grant="${u.id}">Donner Pro</button>
          </div>
          <button class="btn small ${banned ? '' : 'danger'}" data-ban="${u.id}" data-banned="${banned}">${banned ? 'Débannir' : 'Bannir'}</button>
          <button class="btn small ghost" data-reset="${u.id}" data-email="${u.email}">Réinitialiser mdp</button>
          <button class="btn small danger" data-delete="${u.id}">Supprimer</button>
        </div>
        <div class="success-msg" id="msg-${u.id}"></div>
      </div>
    `;
  }).join('');

  zone.querySelectorAll('[data-grant]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-grant');
      const days = parseInt(document.getElementById('days-' + id).value);
      if(!days || days < 1){ alert('Indique un nombre de jours valide.'); return; }
      const { ok, data } = await callAdminApi('/api/admin-grant-pro', { userId: id, days });
      showMsg(id, ok ? `Pro activé pour ${days} jours.` : (data && data.error) || 'Erreur.');
      if(ok) loadUsers();
    });
  });

  zone.querySelectorAll('[data-ban]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-ban');
      const currentlyBanned = btn.getAttribute('data-banned') === 'true';
      const { ok, data } = await callAdminApi('/api/admin-ban', { userId: id, banned: !currentlyBanned });
      showMsg(id, ok ? (currentlyBanned ? 'Utilisateur débanni.' : 'Utilisateur banni.') : (data && data.error) || 'Erreur.');
      if(ok) loadUsers();
    });
  });

  zone.querySelectorAll('[data-reset]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-reset');
      const email = btn.getAttribute('data-email');
      if(!confirm(`Générer un nouveau mot de passe temporaire pour ${email} ?`)) return;
      const { ok, data } = await callAdminApi('/api/admin-reset-password', { userId: id });
      if(ok && data && data.tempPassword){
        showMsg(id, `Nouveau mot de passe : ${data.tempPassword} (transmets-le à l'utilisateur)`);
      } else {
        showMsg(id, (data && data.error) || 'Erreur.');
      }
    });
  });

  zone.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-delete');
      if(!confirm("Supprimer définitivement cet utilisateur et son quiz ? Cette action est irréversible.")) return;
      const { ok, data } = await callAdminApi('/api/admin-delete-user', { userId: id });
      if(ok) loadUsers();
      else showMsg(id, (data && data.error) || 'Erreur.');
    });
  });
}

function showMsg(userId, text){
  const el = document.getElementById('msg-' + userId);
  if(el) el.textContent = text;
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch((err) => console.error("Échec de l'enregistrement du service worker :", err));
  });
}
</script>
<script src="pwa-install.js"></script>
</body>
</html>
