<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Compatibility Quiz — Crée le tien</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#100c1c">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CompatQuiz">
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Compatibility Quiz</div>
  <h1 class="title">Crée ton propre<br/>quiz de compatibilité</h1>
  <p class="lede">Un compte, un quiz, un lien à partager. Découvre qui te ressemble vraiment.</p>

  <!-- Formulaire de connexion -->
  <div class="card" id="loginCard">
    <div class="eyebrow">Connexion</div>
    <input type="email" id="loginEmail" placeholder="Email" autocomplete="email" />
    <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="current-password" />
    <div class="error-msg" id="loginError"></div>
    <button class="btn" id="loginBtn">Se connecter</button>
  </div>

  <!-- Formulaire d'inscription -->
  <div class="card" id="signupCard">
    <div class="eyebrow">Pas encore de compte ?</div>
    <input type="text" id="signupUsername" placeholder="Nom d'utilisateur" autocomplete="off" />
    <input type="email" id="signupEmail" placeholder="Email" autocomplete="email" />
    <input type="password" id="signupPassword" placeholder="Mot de passe (6 caractères min.)" autocomplete="new-password" />
    <div class="error-msg" id="signupError"></div>
    <div class="success-msg" id="signupSuccess"></div>
    <button class="btn secondary" id="signupBtn">Créer mon compte</button>
  </div>

  <div class="signature">— Joël Valdo</div>
</div>

<script>
// Si déjà connecté, on file directement au dashboard.
(async ()=>{
  const { data: { session } } = await sb.auth.getSession();
  if(session) window.location.href = 'dashboard.html';
})();

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if(!email || !password){ errEl.textContent = 'Renseigne ton email et ton mot de passe.'; return; }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){
    // On affiche la vraie raison : ça évite de confondre "email pas encore
    // confirmé" avec "mot de passe incorrect", qui n'ont pas la même solution.
    if(error.message.toLowerCase().includes('email not confirmed')){
      errEl.textContent = "Ton email n'est pas encore confirmé. Vérifie ta boîte mail (et les spams).";
    } else if(error.message.toLowerCase().includes('invalid login credentials')){
      errEl.textContent = "Email ou mot de passe incorrect.";
    } else {
      errEl.textContent = error.message;
    }
    return;
  }
  window.location.href = 'dashboard.html';
});

document.getElementById('signupBtn').addEventListener('click', async ()=>{
  const username = document.getElementById('signupUsername').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const errEl = document.getElementById('signupError');
  const okEl = document.getElementById('signupSuccess');
  errEl.textContent = ''; okEl.textContent = '';
  if(!username || !email || !password){ errEl.textContent = 'Tous les champs sont requis.'; return; }
  if(password.length < 6){ errEl.textContent = 'Le mot de passe doit faire au moins 6 caractères.'; return; }

  try{
    // Le username est passé en métadonnée : un trigger côté base de données
    // s'en sert pour créer automatiquement la ligne "profiles" correspondante.
    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { username } }
    });

    if(error){
      // On journalise toujours l'erreur brute en console pour pouvoir la
      // diagnostiquer facilement si un cas imprévu se reproduit.
      console.error('Erreur signUp :', error);
      const msg = error.message || error.error_description || '';
      if(msg.toLowerCase().includes('already')){
        errEl.textContent = 'Cet email est déjà utilisé.';
      } else if(msg.toLowerCase().includes('username') || msg.toLowerCase().includes('duplicate')){
        errEl.textContent = "Ce nom d'utilisateur est déjà pris, choisis-en un autre.";
      } else if(msg){
        errEl.textContent = msg;
      } else {
        errEl.textContent = "Erreur inattendue lors de l'inscription (détails dans la console du navigateur).";
      }
      return;
    }

    // Cas particulier Supabase : si l'email a déjà un compte ET que la
    // confirmation par email est activée, signUp() ne renvoie PAS d'erreur
    // (mesure anti-énumération des comptes) mais renvoie un utilisateur sans
    // "identities". Sans ce contrôle, on afficherait un faux "compte créé !".
    if(data && data.user && Array.isArray(data.user.identities) && data.user.identities.length === 0){
      errEl.textContent = "Cet email a déjà un compte. Essaie de te connecter ci-dessus.";
      return;
    }

    okEl.textContent = "Compte créé ! Tu peux te connecter ci-dessus.";
  } catch(err){
    console.error('Exception signUp :', err);
    errEl.textContent = "Erreur réseau ou serveur, réessaie dans un instant.";
  }
});
</script>

<script>
// Enregistrement du service worker : rend le site installable (icône sur
// l'écran d'accueil, ouverture en plein écran, sans barre de navigateur).
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch((err) => console.error("Échec de l'enregistrement du service worker :", err));
  });
}
</script>
<script src="pwa-install.js"></script>
</body>
</html>
