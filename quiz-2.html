<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Quiz de compatibilité</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#100c1c">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CompatQuiz">
<style>
  #page-flow{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;}
  #vn-wrap{width:100%;max-width:460px;margin-bottom:20px;}
  #vn-box{background:linear-gradient(180deg,#241d3d,#1a1530);border:1px solid var(--border);border-radius:18px;padding:16px 18px;box-shadow:0 10px 30px rgba(0,0,0,.35);}
  #vn-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  #vn-avatar{width:34px;height:34px;border-radius:50%;background:conic-gradient(from 210deg,var(--pink),var(--gold),var(--pink));display:flex;align-items:center;justify-content:center;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;color:#20142a;font-size:14px;}
  #vn-name{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;}
  #vn-text{font-size:15.5px;line-height:1.55;min-height:44px;}
  .cursor{opacity:.6;animation:blink .9s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  #choices{width:100%;max-width:460px;display:flex;flex-direction:column;gap:10px;}
  .choice-btn{padding:13px 16px;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:14.5px;text-align:left;cursor:pointer;font-family:'Poppins',sans-serif;}
  .choice-btn:hover{border-color:var(--pink);background:var(--panel2);}
  .progress-track{width:100%;max-width:460px;height:4px;background:var(--panel2);border-radius:4px;margin-bottom:18px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--gold));border-radius:4px;transition:width .4s ease;}
  .score-ring{width:170px;height:170px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:8px auto 20px;}
  .score-num{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:38px;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="page-flow">
  <div id="vn-wrap" class="hidden">
    <div id="vn-box">
      <div id="vn-header">
        <div id="vn-avatar">?</div>
        <div id="vn-name"></div>
      </div>
      <div id="vn-text"></div>
    </div>
  </div>
  <div id="app" class="wrap"><p class="empty-state">Chargement…</p></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const QUIZ_ID = params.get('q');

let STATE = { name:'', quiz:null, questions:[], current:0, answers:[], score:0 };

const app = document.getElementById('app');
const vnWrap = document.getElementById('vn-wrap');
const vnText = document.getElementById('vn-text');

function showVN(){ vnWrap.classList.remove('hidden'); }
function hideVN(){ vnWrap.classList.add('hidden'); }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function typeInto(el, text, speed){
  return new Promise(resolve=>{
    el.innerHTML = '';
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className='cursor'; cursor.textContent='▋';
    function step(){
      if(i <= text.length){ el.textContent = text.slice(0,i); el.appendChild(cursor); i++; setTimeout(step, speed||16); }
      else { cursor.remove(); resolve(); }
    }
    step();
  });
}

// Avant d'enchaîner automatiquement sur le message suivant, on attend un
// vrai clic sur "Continuer" plutôt qu'un délai fixe — voir
// waitForContinueInChoices ci-dessous, utilisée partout dans ce fichier.

async function init(){
  if(!QUIZ_ID){
    app.innerHTML = `<div class="card"><p class="empty-state">Lien de quiz invalide.</p></div>`;
    return;
  }
  const { data: quiz, error } = await sb.from('quizzes').select('*').eq('id', QUIZ_ID).maybeSingle();
  if(error || !quiz){
    app.innerHTML = `<div class="card"><p class="empty-state">Ce quiz n'existe pas ou plus.</p></div>`;
    return;
  }
  STATE.quiz = quiz;
  document.getElementById('vn-name').textContent = quiz.title.split(' ')[0] || 'Quiz';
  document.getElementById('vn-avatar').textContent = (quiz.title[0] || 'Q').toUpperCase();
  document.title = quiz.title;
  renderIntro();
}

function renderIntro(){
  app.innerHTML = `
    <div class="eyebrow">Compatibility Quiz</div>
    <h1 class="title">${escapeHtml(STATE.quiz.title)}</h1>
    <p class="lede">Réponds honnêtement pour connaître ton taux de compatibilité.</p>
    <div class="card">
      <input type="text" id="nameInput" placeholder="Ton prénom" autocomplete="off" />
      <button class="btn" id="startBtn">Commencer ✨</button>
    </div>
  `;
  const nameInput = document.getElementById('nameInput');
  const startBtn = document.getElementById('startBtn');
  nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') startBtn.click(); });
  startBtn.addEventListener('click', async ()=>{
    const name = nameInput.value.trim();
    if(!name){ nameInput.style.borderColor='#ff8a80'; return; }
    STATE.name = name;
    const { data: questions } = await sb.from('quiz_questions').select('*').eq('quiz_id', STATE.quiz.id).order('position', { ascending:true });
    if(!questions || questions.length === 0){
      app.innerHTML = `<div class="card"><p class="empty-state">Ce quiz n'a pas encore de questions.</p></div>`;
      return;
    }
    STATE.questions = questions;
    STATE.current = 0; STATE.answers = [];
    startQuiz();
  });
}

function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

async function startQuiz(){
  showVN();
  app.innerHTML = `<div class="progress-track" id="progressTrack"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><div id="choices"></div>`;
  await typeInto(vnText, `Ravi de te lire, ${STATE.name}. On y va tout doux.`, 18);
  await waitForContinueInChoices("Continuer");
  askQuestion();
}

// Variante de waitForContinue qui utilise #choices (déjà présent pendant le quiz)
// plutôt que de remplacer tout #app, pour garder la barre de progression visible.
function waitForContinueInChoices(label){
  return new Promise(resolve=>{
    const choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = `<button class="choice-btn" id="continueChoiceBtn" style="text-align:center;">${label}</button>`;
    document.getElementById('continueChoiceBtn').addEventListener('click', ()=>{ choicesEl.innerHTML=''; resolve(); });
  });
}

async function askQuestion(){
  const q = STATE.questions[STATE.current];
  const total = STATE.questions.length;
  const fill = document.getElementById('progressFill');
  if(fill) fill.style.width = Math.round((STATE.current/total)*100) + '%';
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  await typeInto(vnText, q.text, 14);
  q.options.forEach((opt, idx)=>{
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt;
    btn.addEventListener('click', ()=> handleAnswer(idx));
    choicesEl.appendChild(btn);
  });
}

function handleAnswer(idx){
  const q = STATE.questions[STATE.current];
  STATE.answers.push({ question:q.text, chosen:q.options[idx], isMatch: idx === q.correct_index });
  STATE.current++;
  if(STATE.current < STATE.questions.length) askQuestion();
  else finishQuiz();
}

async function finishQuiz(){
  const matches = STATE.answers.filter(a=>a.isMatch).length;
  STATE.score = Math.round((matches/STATE.answers.length)*100);
  const fill = document.getElementById('progressFill');
  if(fill) fill.style.width = '100%';
  document.getElementById('choices').innerHTML = '';
  const calcMsg = `C'est noté. Je calcule tout ça…`;
  await typeInto(vnText, calcMsg, 18);
  await waitForContinueInChoices("Voir mon résultat");
  await saveResponse();
  showResult();
}

async function saveResponse(){
  // On génère l'id nous-mêmes plutôt que de le lire en retour après l'insertion
  // (.select().single()) : un visiteur anonyme n'a pas le droit de RELIRE la
  // ligne qu'il vient de créer (seul le propriétaire du quiz peut la lire),
  // donc ce "retour" échouait silencieusement et la ligne de détail n'était
  // jamais enregistrée. En connaissant déjà l'id, on n'a plus besoin de relire.
  const responseId = crypto.randomUUID();
  const { error: respError } = await sb.from('quiz_responses').insert({
    id: responseId, quiz_id: STATE.quiz.id, respondent_name: STATE.name, score: STATE.score
  });
  if(respError){ console.error('Erreur enregistrement réponse :', respError); return; }
  const { error: ansError } = await sb.from('quiz_response_answers').insert({ response_id: responseId, answers: STATE.answers });
  if(ansError){ console.error('Erreur enregistrement détail des réponses :', ansError); }
}

function ringColor(score){
  if(score >= 75) return '#ff7aa8';
  if(score >= 45) return '#ffcb66';
  return '#8a7aa8';
}

function showResult(){
  hideVN();
  const c = ringColor(STATE.score);
  app.innerHTML = `
    <div class="eyebrow">Résultat</div>
    <h1 class="title" style="font-size:22px;">Ton taux de compatibilité</h1>
    <div class="score-ring" style="background:conic-gradient(${c} ${STATE.score*3.6}deg, #241d3d 0deg);">
      <div style="width:140px;height:140px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;">
        <div class="score-num">${STATE.score}%</div>
      </div>
    </div>
    <div class="card" style="text-align:center;">
      <p class="lede" style="margin-bottom:6px;">${resultLine(STATE.score)}</p>
      <p style="font-size:12.5px;color:var(--text-dim);">Merci d'avoir répondu, ${escapeHtml(STATE.name)} 🌸</p>
    </div>
  `;
}

function resultLine(score){
  if(score >= 80) return "De sacrées bases en commun. 👀";
  if(score >= 55) return "Il y a clairement quelque chose à explorer.";
  if(score >= 30) return "Des différences, mais rien d'insurmontable.";
  return "Vous ne voyez pas tout à fait le monde pareil… et alors ?";
}

init();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch((err) => console.error("Échec de l'enregistrement du service worker :", err));
  });
}
</script>
</body>
</html>
